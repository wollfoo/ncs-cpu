# Comprehensive Cloaking Strategies Configuration
# Configuration cho comprehensive resource cloaking system

cloaking_strategies:
  # Primary strategies - always enabled for their respective process types
  cpu_cloaking:
    enabled: true
    priority: 100
    config:
      throttle_percentage: 70
      target_cores: [0, 1, 2, 3]
      advanced_stealth: true
      
  gpu_cloaking:
    enabled: true
    priority: 100
    config:
      throttle_percentage: 80
      target_sm_clock: 1000
      target_mem_clock: 4000
      thermal_control: true

  # Additional comprehensive strategies - applied to all processes
  network:
    enabled: true
    priority: 80
    config:
      bandwidth_reduction_mbps: 50
      interface: "eth0"
      packet_marking: true
      traffic_shaping: true
      
  disk_io:
    enabled: true
    priority: 70
    config:
      io_weight: 3  # ionice best effort class, weight 3
      io_scheduling_class: "best-effort"
      
  cache:
    enabled: true
    priority: 60
    config:
      cache_limit_percent: 30
      drop_caches_periodically: true
      cache_monitoring: true
      
  memory:
    enabled: true
    priority: 75
    config:
      memory_limit_mb: 2048
      swap_usage_limit: 512
      oom_killer_protection: true

  # Experimental/Advanced strategies
  thermal_control:
    enabled: true
    priority: 50
    config:
      gpu_temp_threshold: 75
      cpu_temp_threshold: 80
      aggressive_cooling: false

# Process-specific strategy hints
process_strategy_hints:
  CPU:
    stealth_requirements: "medium"
    cloaking_aggressiveness: "moderate" 
    optimization_level: "balanced"
    disabled_strategies: []  # No disabled strategies for CPU
    additional_strategies: []  # Use default additional strategies
    
  GPU:
    stealth_requirements: "high"
    cloaking_aggressiveness: "aggressive"
    optimization_level: "aggressive"
    disabled_strategies: []  # No disabled strategies for GPU
    additional_strategies: ["thermal_control"]  # Add thermal control for GPU

# System availability detection
system_detection:
  auto_detect_capabilities: true
  fallback_to_available: true
  skip_unavailable_gracefully: true
  
# Comprehensive cloaking behavior
comprehensive_cloaking:
  apply_all_available: true
  continue_on_strategy_failure: true
  primary_strategy_required: true
  log_strategy_results: true
  partial_success_acceptable: true

# Performance optimization
performance:
  strategy_caching: true
  parallel_application: false  # Sequential for reliability
  cache_strategy_instances: true
  reuse_configurations: true